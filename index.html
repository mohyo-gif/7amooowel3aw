<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حمو ولعه - المطاريد</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma; 
            background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed; 
            background-size: cover;
            text-align: center; 
            position: relative;
        }
        
        /* كلمة المطاريد: تظهر مرة واحدة فقط ضخمة وفي المنتصف */
        body::before {
            content: "المطاريد"; 
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-10deg);
            font-size: 18vw; /* حجم ضخم جداً لمرة واحدة */
            font-weight: 900;
            color: rgba(220, 20, 60, 0.4); /* لون دم شفاف */
            white-space: nowrap;
            z-index: -1;
            pointer-events: none;
            font-family: 'Cairo', sans-serif;
            animation: pulse-blood 3s infinite alternate;
        }

        @keyframes pulse-blood {
            from { text-shadow: 0 0 15px rgba(220, 20, 60, 0.5); transform: translate(-50%, -50%) rotate(-10deg) scale(1); }
            to { text-shadow: 0 0 40px rgba(220, 20, 60, 1); transform: translate(-50%, -50%) rotate(-10deg) scale(1.05); }
        }

        #game-container { 
            position: relative; 
            width: 100vw; 
            height: 80vh; 
            background: rgba(15, 52, 96, 0.4); 
            border-bottom: 8px solid #dc143c; 
            overflow: hidden;
        }
        
        .word { 
            position: absolute; 
            font-size: 28px; 
            font-weight: bold; 
            color: #fff; 
            background: linear-gradient(45deg, #8b0000, #ff0000); 
            padding: 10px 25px; 
            border-radius: 50px; 
            box-shadow: 0 5px 20px rgba(220, 20, 60, 0.8);
            animation: glow 1.5s infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 10px #8b0000; }
            to { box-shadow: 0 0 25px #ff0000; }
        }

        #input-container { margin-top: 20px; }
        #word-input { 
            font-size: 26px; 
            padding: 15px; 
            border-radius: 30px; 
            border: 3px solid #dc143c; 
            background: rgba(26, 26, 46, 0.9); 
            color: white; 
            width: 400px; 
            text-align: center; 
            outline: none;
            box-shadow: 0 0 20px rgba(220, 20, 60, 0.5);
        }

        #stats { 
            display: flex; 
            justify-content: space-around; 
            font-size: 24px; 
            padding: 20px; 
            background: rgba(15, 52, 96, 0.9); 
            color: #dc143c; 
            font-weight: bold;
        }

        .mute-btn {
            position: fixed;
            top: 80px;
            left: 20px;
            z-index: 100;
            padding: 10px 20px;
            background: #dc143c;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&display=swap" rel="stylesheet">
</head>
<body>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <button class="mute-btn" onclick="toggleMute()">كتم/تشغيل الموسيقى 🔊</button>

    <div id="stats">
        <div>النقاط: <span id="score">0</span></div>
        <div>المستوى: <span id="level">سهل جداً ✨</span></div>
        <div>المحاولات: <span id="lives">1</span></div>
    </div>

    <div id="game-container"></div>

    <div id="input-container">
        <input type="text" id="word-input" placeholder="اكتب يا فحل" autofocus autocomplete="off">
    </div>

    <script>
        const container = document.getElementById('game-container');
        const input = document.getElementById('word-input');
        const scoreDisplay = document.getElementById('score');
        const levelDisplay = document.getElementById('level');
        const livesDisplay = document.getElementById('lives');
        const bgMusic = document.getElementById('bg-music');

        let score = 0;
        let lives = 1;
        let speed = 0.9; 
        let wordsOnScreen = [];
        let gameActive = true;
        let musicStarted = false;

        const myWords = ["محفظة", "سياج", "اختراق", "انذار", "فقل", "سرقة", "نقود" ];

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        }

        function toggleMute() {
            bgMusic.muted = !bgMusic.muted;
        }

        function createWord() {
            if (!gameActive) return;
            const wordText = myWords[Math.floor(Math.random() * myWords.length)];
            const wordDiv = document.createElement('div');
            wordDiv.className = 'word';
            wordDiv.innerText = wordText;
            wordDiv.style.top = '-60px';
            wordDiv.style.left = Math.random() * (window.innerWidth - 200) + 'px';
            container.appendChild(wordDiv);
            wordsOnScreen.push({ element: wordDiv, top: -60, text: wordText });
        }

        function gameLoop() {
            if (!gameActive) return;
            for (let i = wordsOnScreen.length - 1; i >= 0; i--) {
                let wordObj = wordsOnScreen[i];
                wordObj.top += speed;
                wordObj.element.style.top = wordObj.top + 'px';

                if (wordObj.top > container.offsetHeight) {
                    container.removeChild(wordObj.element);
                    wordsOnScreen.splice(i, 1);
                    lives--;
                    livesDisplay.innerText = lives;
                    playTone(150, 'square', 0.3);
                    if (lives <= 0) { gameOver(); }
                }
            }
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameActive = false;
            bgMusic.pause();
            alert("انتهى التحدي يا فحل! نقاطك: " + score);
            location.reload();
        }

        input.addEventListener('input', () => {
            if (!musicStarted) {
                bgMusic.play();
                musicStarted = true;
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const typed = input.value.trim();
            const foundIndex = wordsOnScreen.findIndex(w => w.text === typed);
            if (foundIndex !== -1) {
                playTone(600, 'sine', 0.2);
                container.removeChild(wordsOnScreen[foundIndex].element);
                wordsOnScreen.splice(foundIndex, 1);
                input.value = '';
                score += 10;
                scoreDisplay.innerText = score;

                if (score >= 60) {
                    speed = 1.8;
                    levelDisplay.innerText = "متوسط 💪";
                }
                if (score >= 150) {
                    speed = 3.5;
                    levelDisplay.innerText = "صعب 🔥";
                }
            }
        });

        setInterval(createWord, 2500); 
        gameLoop();
    </script>
</body>
</html>
